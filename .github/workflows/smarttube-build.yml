name: SmartTube package build (validate)

# Stage-A for the SmartTube (YouTube) mode: compile the VENDORED SmartTubeIOS SPM package
# (Vendor/SmartTube/SmartTubeIOS — a snapshot of the user's local milika/SmartTubeIOS fork with
# FirebaseCrashlytics stripped + Swift-5 language mode) for iOS device, to prove it builds before
# the full OpenClaw integration. Upstream master is a WIP that doesn't compile, which is why the
# known-good local version is vendored instead of cloned.

on:
  workflow_dispatch:
  push:
    branches: [utm-mode]
    paths:
      - "Vendor/SmartTube/**"
      - "Modes/SmartTube/fork/**"
      - ".github/workflows/smarttube-build.yml"

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          [ -n "$LATEST" ] && sudo xcode-select -s "$LATEST" || true
          xcodebuild -version

      - name: Build vendored SmartTubeIOS package for iOS (device)
        run: |
          cd Vendor/SmartTube/SmartTubeIOS
          set -o pipefail
          xcodebuild build \
            -scheme SmartTubeIOS \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            -skipPackagePluginValidation \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            2>&1 | tee build.log \
            | grep -E "error:|BUILD (SUCCEEDED|FAILED)|Undefined symbols" || true
          grep -q "\*\* BUILD SUCCEEDED \*\*" build.log || { echo "::error::vendored SmartTubeIOS build failed"; exit 1; }

      - name: Diagnostics (always)
        if: always()
        run: |
          cd Vendor/SmartTube/SmartTubeIOS
          echo "=== errors ==="; grep -E "error:" build.log 2>/dev/null | head -40 || true
