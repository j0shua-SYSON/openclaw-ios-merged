name: iSH build (framework)

# Milestone 1b for the iSH mode embed: apply the fork (iSH app target -> iSH.framework,
# drop the FileProvider extension, neutralize main) and build iSH.framework on our
# runner. Manual, or on push to the ish-mode branch; never runs on main.

on:
  workflow_dispatch:
  push:
    branches: [ish-mode]
    paths:
      - "Modes/iSH/fork/**"
      - ".github/workflows/ish-build.yml"

env:
  ISH_REPO: https://github.com/ish-app/ish.git
  ISH_SHA: 997642f3787cc63e65f7134b7bb0362c74bff8e0

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout OpenClaw (for the fork scripts)
        uses: actions/checkout@v4
        with:
          path: openclaw

      - name: Clone iSH + submodules
        run: |
          set -e
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git clone "$ISH_REPO" ish
          cd ish
          git checkout "$ISH_SHA"
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --recursive --jobs 4

      - name: Install build deps (mirrors iSH CI)
        run: brew install llvm lld ninja libarchive meson

      - name: Apply OpenClaw iSH fork
        run: |
          set -e
          sudo gem install xcodeproj --no-document
          chmod +x openclaw/Modes/iSH/fork/apply_fork.sh
          bash openclaw/Modes/iSH/fork/apply_fork.sh "$PWD/ish" "$PWD/openclaw/Modes/iSH/fork"

      - name: Build iSH.framework (arm64 device)
        run: |
          cd ish
          set -o pipefail
          xcodebuild build \
            -project iSH.xcodeproj \
            -scheme iSH \
            -arch arm64 -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            2>&1 | tee build.log \
            | grep -E "error:|BUILD (SUCCEEDED|FAILED)|Undefined symbols|ld: |meson|ninja|Ld |Compile JavaScript|Download Root" || true
          # tee/grep would otherwise mask xcodebuild's real exit; assert the build worked.
          grep -q "\*\* BUILD SUCCEEDED \*\*" build.log || { echo "::error::iSH build did not succeed"; exit 1; }

      - name: Diagnostics (always)
        if: always()
        run: |
          cd ish
          echo "=== last 120 lines of build.log ==="
          tail -120 build.log 2>/dev/null || echo "(no build.log)"
          echo "=== ALL iSH.framework dirs (size + top-level contents) ==="
          find build -type d -name "iSH.framework" 2>/dev/null | while read d; do
            echo ">>> $(du -sh "$d" 2>/dev/null | cut -f1)  $d"
            ls "$d" 2>/dev/null | sed 's/^/      /'
          done
          echo "=== iSH Mach-O binaries anywhere under build ==="
          find build -type f -name "iSH" 2>/dev/null | while read f; do echo "  $f : $(file -b "$f" 2>/dev/null)"; done
          echo "=== resources anywhere under Products ==="
          find build/Build/Products \( -name "*.storyboardc" -o -name "Assets.car" -o -name "term.html" -o -name "hterm_all.js" \) 2>/dev/null | sed 's/^/  /' | head -20
          # Pick the framework that actually has a binary as the real one.
          FW=$(find build -type d -name "iSH.framework" 2>/dev/null | grep -iv "EagerLinking" | while read d; do [ -f "$d/iSH" ] && echo "$d"; done | head -1)
          [ -z "$FW" ] && FW=$(find build -type d -name "iSH.framework" 2>/dev/null | grep -iv "EagerLinking" | head -1)
          echo "REAL FRAMEWORK: $FW"
          if [ -n "$FW" ]; then
            echo "=== ls -laR (first 100) ==="
            ls -laR "$FW" | head -100
            echo "=== binary ==="
            file "$FW/iSH" 2>/dev/null || echo "(no iSH binary!)"
            echo "=== key resources present? ==="
            for r in Terminal.storyboardc About.storyboardc Roots.storyboardc Assets.car term.html hterm_all.js; do
              found=$(find "$FW" -name "$r" 2>/dev/null | head -1)
              echo "  $r -> ${found:-MISSING}"
            done
            echo "=== any tar/rootfs? ==="
            find "$FW" \( -name "*.tar*" -o -name "*.zip" -o -iname "*alpine*" \) 2>/dev/null | head
            mkdir -p ../out
            tar czf ../out/iSH.framework.tgz -C "$(dirname "$FW")" iSH.framework
            echo "tarred -> out/iSH.framework.tgz ($(du -h ../out/iSH.framework.tgz | cut -f1))"
          fi

      - name: Upload iSH.framework artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iSH-framework
          path: out/iSH.framework.tgz
          if-no-files-found: warn
