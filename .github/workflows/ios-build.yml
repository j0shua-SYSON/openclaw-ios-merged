name: iOS Build (unsigned)

# Builds OpenClaw into an UNSIGNED .ipa on a macOS runner.
# Sign it afterwards with the "Re-sign IPA" workflow.

on:
  workflow_dispatch:
    inputs:
      include_utm:
        description: "Embed UTM SE (adds ~2GB + ~30min sign). Leave off for fast iteration; turn on for the final build."
        type: boolean
        default: false
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "MERGE_PLAN.md"
      # Mode fork scripts are consumed only by their Stage-A validators; they don't
      # affect the OpenClaw build until project.yml + ios-build.yml wire them in.
      - "Modes/Delta/**"
      - "Modes/Feather/**"
      - "Modes/iSH/**"
      - "Modes/UTM/**"
      - "Modes/Yattee/**"

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  DELTA_REPO: https://github.com/rileytestut/Delta.git
  DELTA_SHA: adee3c5c13a5fd944d0389cdbdd526cdcff2e6e6
  FEATHER_REPO: https://github.com/claration/Feather.git
  FEATHER_SHA: 82a0087b28da3db5665c0a1e255acfe0151c4caa
  ISH_REPO: https://github.com/ish-app/ish.git
  ISH_SHA: 997642f3787cc63e65f7134b7bb0362c74bff8e0
  UTM_REPO: https://github.com/utmapp/UTM.git
  UTM_SHA: e4a4c34b671284263fc69f81b607de494d7e9b65
  YATTEE_REPO: https://github.com/yattee/yattee.git
  YATTEE_SHA: c0815353

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select newest Xcode
        run: |
          set -e
          echo "Installed Xcodes:"; ls -d /Applications/Xcode*.app 2>/dev/null || true
          latest=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)
          [ -z "$latest" ] && latest=/Applications/Xcode.app
          echo "Selecting: $latest"
          sudo xcode-select -s "$latest"
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      # --- Delta mode: build the forked Delta.framework + core frameworks -------
      # Delta's app layer is forked into Delta.framework inside Delta's own
      # CocoaPods workspace (Stage A, validated by deltamode-build.yml). We build
      # it here and drop the 13 dynamic frameworks into Vendor/DeltaPrebuilt/ for
      # project.yml to embed. Cached on the Delta SHA + fork scripts so unrelated
      # OpenClaw changes reuse the prior Delta build.
      - name: Restore Delta frameworks cache
        id: delta-cache
        uses: actions/cache/restore@v4
        with:
          path: Vendor/DeltaPrebuilt
          key: delta-fw-v1-${{ env.DELTA_SHA }}-${{ hashFiles('Modes/Delta/fork/**', 'Modes/Delta/App/**') }}

      - name: Build Delta frameworks
        if: steps.delta-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git lfs install
          git clone "$DELTA_REPO" delta
          cd delta
          git checkout "$DELTA_SHA"
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --recursive --jobs 4
          git lfs pull || true
          git submodule foreach --recursive 'git lfs pull || true'
          cd ..
          sudo gem install xcodeproj --no-document
          chmod +x Modes/Delta/fork/apply_fork.sh
          bash Modes/Delta/fork/apply_fork.sh "$PWD/delta" "$PWD/Modes/Delta/fork"
          cd delta
          set -o pipefail
          xcodebuild build \
            -workspace Delta.xcworkspace \
            -scheme Delta \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            | tee build.log | grep -E "error:|BUILD (SUCCEEDED|FAILED)" || true
          cd ..
          PRODUCTS="delta/build/Build/Products/Debug-iphoneos"
          mkdir -p Vendor/DeltaPrebuilt
          for fw in Delta DeltaCore NESDeltaCore SNESDeltaCore GBADeltaCore GBCDeltaCore \
                    GPGXDeltaCore MelonDSDeltaCore N64DeltaCore N64DeltaCore_RSP \
                    N64DeltaCore_Video OperatorKit ZIPFoundation; do
            if [ -d "$PRODUCTS/$fw.framework" ]; then
              cp -R "$PRODUCTS/$fw.framework" Vendor/DeltaPrebuilt/
            else
              echo "::error::Delta framework missing: $fw.framework"; exit 1
            fi
          done
          # Reclaim disk: the Delta clone + DerivedData are large and no longer needed.
          rm -rf delta
          echo "--- Vendor/DeltaPrebuilt ---"; ls Vendor/DeltaPrebuilt

      # Save immediately after a successful Delta build (before the OpenClaw archive)
      # so the cache persists even if a later OpenClaw step fails — keeps iteration fast.
      - name: Save Delta frameworks cache
        if: steps.delta-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: Vendor/DeltaPrebuilt
          key: delta-fw-v1-${{ env.DELTA_SHA }}-${{ hashFiles('Modes/Delta/fork/**', 'Modes/Delta/App/**') }}

      # --- Feather mode: build the forked Feather.framework + OpenSSL ------------
      # Feather's SwiftUI app layer is forked into Feather.framework (Stage A,
      # validated by feathermode-build.yml). Pods/SPM are static and bake in; only
      # Feather.framework + OpenSSL.framework (from Zsign) ship dynamic. Cached on
      # the Feather SHA + fork scripts.
      - name: Restore Feather frameworks cache
        id: feather-cache
        uses: actions/cache/restore@v4
        with:
          path: Vendor/FeatherPrebuilt
          key: feather-fw-v2-${{ env.FEATHER_SHA }}-${{ hashFiles('Modes/Feather/fork/**', 'Modes/Feather/App/**') }}

      - name: Build Feather frameworks
        if: steps.feather-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git lfs install
          git clone "$FEATHER_REPO" feather
          cd feather
          git checkout "$FEATHER_SHA"
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --recursive --jobs 4
          git lfs pull || true
          git submodule foreach --recursive 'git lfs pull || true'
          cd ..
          sudo gem install xcodeproj --no-document
          chmod +x Modes/Feather/fork/apply_fork.sh
          bash Modes/Feather/fork/apply_fork.sh "$PWD/feather" "$PWD/Modes/Feather/fork"
          cd feather
          set -o pipefail
          xcodebuild build \
            -project Feather.xcodeproj \
            -scheme Feather \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            | tee build.log | grep -E "error:|BUILD (SUCCEEDED|FAILED)" || true
          cd ..
          PRODUCTS="feather/build/Build/Products/Debug-iphoneos"
          mkdir -p Vendor/FeatherPrebuilt
          for fw in Feather OpenSSL; do
            if [ -e "$PRODUCTS/$fw.framework" ]; then
              # -L: Feather.framework in Products is a symlink to the installed copy
              # (the target deploys to _build/Library/Frameworks); dereference it so
              # we copy the real framework, not a dangling symlink after `rm -rf`.
              cp -RL "$PRODUCTS/$fw.framework" Vendor/FeatherPrebuilt/
            else
              echo "::error::Feather framework missing: $fw.framework"; exit 1
            fi
          done
          rm -rf feather
          echo "--- Vendor/FeatherPrebuilt ---"; ls Vendor/FeatherPrebuilt

      - name: Save Feather frameworks cache
        if: steps.feather-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: Vendor/FeatherPrebuilt
          key: feather-fw-v2-${{ env.FEATHER_SHA }}-${{ hashFiles('Modes/Feather/fork/**', 'Modes/Feather/App/**') }}

      # iSH mode — the x86/Linux emulator forked into iSH.framework (Modes/iSH/fork),
      # built by meson/ninja inside Xcode. The one dylib bakes in the emulator, the ObjC
      # app layer, libarchive, the Alpine rootfs (root.tar.gz), and the hterm terminal.
      # Cached on the iSH SHA + fork scripts.
      - name: Restore iSH framework cache
        id: ish-cache
        uses: actions/cache/restore@v4
        with:
          path: Vendor/iSHPrebuilt
          key: ish-fw-v1-${{ env.ISH_SHA }}-${{ hashFiles('Modes/iSH/fork/**') }}

      - name: Build iSH framework
        if: steps.ish-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          # iSH's meson build links with -fuse-ld=lld, so llvm+lld are required.
          brew install llvm lld ninja libarchive meson
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git clone "$ISH_REPO" ish
          cd ish
          git checkout "$ISH_SHA"
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --recursive --jobs 4
          cd ..
          sudo gem install xcodeproj --no-document
          chmod +x Modes/iSH/fork/apply_fork.sh
          bash Modes/iSH/fork/apply_fork.sh "$PWD/ish" "$PWD/Modes/iSH/fork"
          cd ish
          set -o pipefail
          xcodebuild build \
            -project iSH.xcodeproj \
            -scheme iSH \
            -arch arm64 -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            | tee build.log | grep -E "error:|BUILD (SUCCEEDED|FAILED)|Undefined symbols|ld: " || true
          grep -q "\*\* BUILD SUCCEEDED \*\*" build.log || { echo "::error::iSH build failed"; exit 1; }
          cd ..
          FW=$(find ish/build/Build/Products -type d -name "iSH.framework" | grep -iv EagerLinking | while read d; do [ -f "$d/iSH" ] && echo "$d"; done | head -1)
          [ -n "$FW" ] || { echo "::error::iSH.framework (with binary) not found"; exit 1; }
          mkdir -p Vendor/iSHPrebuilt
          cp -RL "$FW" Vendor/iSHPrebuilt/
          rm -rf ish
          echo "--- Vendor/iSHPrebuilt/iSH.framework ---"; ls Vendor/iSHPrebuilt/iSH.framework | head

      - name: Save iSH framework cache
        if: steps.ish-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: Vendor/iSHPrebuilt
          key: ish-fw-v1-${{ env.ISH_SHA }}-${{ hashFiles('Modes/iSH/fork/**') }}

      # Yattee mode — the forked Yattee iOS app layer as Yattee.framework (Modes/Yattee/fork).
      # Needs no dep-assembly step (unlike UTM): MPVKit/mpv/ffmpeg, SDWebImage, Siesta and
      # Defaults all link statically, leaving libswift_Concurrency (weak, system) as the only
      # @rpath dep. The Core Data model (Yattee.momd) and *.lproj translations ride inside the
      # framework. Cached on the Yattee SHA + fork scripts.
      - name: Restore Yattee framework cache
        id: yattee-cache
        uses: actions/cache/restore@v4
        with:
          path: Vendor/YatteePrebuilt
          key: yattee-fw-v1-${{ env.YATTEE_SHA }}-${{ hashFiles('Modes/Yattee/fork/**') }}

      - name: Build Yattee framework
        if: steps.yattee-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git clone "$YATTEE_REPO" yattee
          cd yattee && git checkout "$YATTEE_SHA" && cd ..
          sudo gem install xcodeproj --no-document
          chmod +x Modes/Yattee/fork/apply_fork.sh
          bash Modes/Yattee/fork/apply_fork.sh "$PWD/yattee" "$PWD/Modes/Yattee/fork"
          cd yattee
          set -o pipefail
          xcodebuild build \
            -project Yattee.xcodeproj \
            -scheme "Yattee (iOS)" \
            -sdk iphoneos -arch arm64 \
            -configuration Release \
            -derivedDataPath build \
            -skipPackagePluginValidation \
            SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            | tee build.log | grep -E "error:|BUILD (SUCCEEDED|FAILED)|Undefined symbols|ld: " || true
          grep -q "\*\* BUILD SUCCEEDED \*\*" build.log || { echo "::error::Yattee build failed"; exit 1; }
          cd ..
          FW=$(find yattee/build/Build/Products -type d -name "Yattee.framework" | grep -iv EagerLinking | while read d; do [ -f "$d/Yattee" ] && echo "$d"; done | head -1)
          [ -n "$FW" ] || { echo "::error::Yattee.framework (with binary) not found"; exit 1; }
          mkdir -p Vendor/YatteePrebuilt
          cp -RL "$FW" Vendor/YatteePrebuilt/
          # The Core Data model must be inside the framework — PersistenceController fatalErrors
          # without it, and Bundle.main (OpenClaw) has no copy to fall back on.
          [ -d Vendor/YatteePrebuilt/Yattee.framework/Yattee.momd ] \
            || { echo "::error::Yattee.momd missing from framework — Core Data would fatalError at runtime"; exit 1; }
          rm -rf yattee
          echo "--- Vendor/YatteePrebuilt/Yattee.framework ---"; ls Vendor/YatteePrebuilt/Yattee.framework | head

      - name: Save Yattee framework cache
        if: steps.yattee-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: Vendor/YatteePrebuilt
          key: yattee-fw-v1-${{ env.YATTEE_SHA }}-${{ hashFiles('Modes/Yattee/fork/**') }}

      # UTM SE mode — the forked UTM iOS-SE app layer as UTM.framework (Modes/UTM/fork),
      # built against our prebuilt ios-tci sysroot. UTM.framework is a monolith (statically
      # links QEMUKit/CocoaSpice + all SPM deps). Its ~63 @rpath deps (glib, gst*, spice,
      # pixman, qemu-<arch>-softmmu, MoltenVK, …) ship PRE-WRAPPED as frameworks in the
      # sysroot's Frameworks/; QEMU firmware/ROMs are share/qemu. Assembled into
      # Vendor/UTMPrebuilt/{Frameworks,Resources}. Cached on the UTM SHA + fork scripts.
      - name: Restore UTM prebuilt cache
        id: utm-cache
        if: github.event.inputs.include_utm == 'true'
        uses: actions/cache/restore@v4
        with:
          path: Vendor/UTMPrebuilt
          key: utm-fw-v2-${{ env.UTM_SHA }}-${{ hashFiles('Modes/UTM/fork/**') }}

      - name: Build UTM.framework + assemble prebuilt
        if: github.event.inputs.include_utm == 'true' && steps.utm-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git clone "$UTM_REPO" utm
          cd utm
          git checkout "$UTM_SHA"
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --recursive --jobs 4 || true
          cd ..
          # Prebuilt ios-tci sysroot (already contains Frameworks/ + share/qemu + share/vulkan).
          gh release download utm-sysroot --repo "${{ github.repository }}" --pattern sysroot.tgz --dir utm
          (cd utm && tar -xzf sysroot.tgz && rm sysroot.tgz && ls -d sysroot-ios-tci-arm64 >/dev/null)
          sudo gem install xcodeproj --no-document
          chmod +x Modes/UTM/fork/apply_fork.sh
          bash Modes/UTM/fork/apply_fork.sh "$PWD/utm" "$PWD/Modes/UTM/fork"
          cd utm
          set -o pipefail
          xcodebuild build \
            -project UTM.xcodeproj -scheme iOS-SE \
            -sdk iphoneos -arch arm64 -configuration Release \
            -derivedDataPath build -enableAddressSanitizer NO \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            | tee build.log | grep -E "error:|BUILD (SUCCEEDED|FAILED)|Undefined symbols|ld: " || true
          grep -q "\*\* BUILD SUCCEEDED \*\*" build.log || { echo "::error::UTM.framework build failed"; exit 1; }
          BIN=build/Build/Products/Release-iphoneos/UTM.framework/UTM
          if otool -L "$BIN" | grep -qi asan_ios; then echo "::error::UTM.framework is ASan-instrumented"; exit 1; fi
          cd ..
          # Assemble Vendor/UTMPrebuilt. Frameworks/ = UTM.framework (+ its 3 SPM resource
          # bundles) + the pre-wrapped dep frameworks. Resources/ = QEMU firmware + vulkan ICDs,
          # which UTM reads from Bundle.main (= OpenClaw.app root once embedded).
          PROD=utm/build/Build/Products/Release-iphoneos
          SYS=utm/sysroot-ios-tci-arm64
          rm -rf Vendor/UTMPrebuilt
          mkdir -p Vendor/UTMPrebuilt/Frameworks Vendor/UTMPrebuilt/Resources
          cp -R "$PROD/UTM.framework" Vendor/UTMPrebuilt/Frameworks/
          for b in CocoaSpice_CocoaSpiceRenderer InAppSettingsKit_InAppSettingsKit ZIPFoundation_ZIPFoundation; do
            [ -d "$PROD/$b.bundle" ] && cp -R "$PROD/$b.bundle" "Vendor/UTMPrebuilt/Frameworks/UTM.framework/$b.bundle" || true
          done
          cp -R "$SYS/Frameworks/." Vendor/UTMPrebuilt/Frameworks/
          cp -R "$SYS/share/qemu" Vendor/UTMPrebuilt/Resources/qemu
          [ -d "$SYS/share/vulkan" ] && cp -R "$SYS/share/vulkan" Vendor/UTMPrebuilt/Resources/vulkan || true
          rm -rf utm
          echo "--- Vendor/UTMPrebuilt: $(find Vendor/UTMPrebuilt/Frameworks -maxdepth 1 -name '*.framework' | wc -l) frameworks ---"
          du -sh Vendor/UTMPrebuilt Vendor/UTMPrebuilt/Resources/qemu 2>/dev/null || true

      - name: Save UTM prebuilt cache
        if: github.event.inputs.include_utm == 'true' && steps.utm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: Vendor/UTMPrebuilt
          key: utm-fw-v2-${{ env.UTM_SHA }}-${{ hashFiles('Modes/UTM/fork/**') }}

      # When UTM is excluded (the fast-iteration default), strip its framework dependency from
      # project.yml so xcodegen doesn't require Vendor/UTMPrebuilt. The UTM Swift refs are gated
      # by #if OPENCLAW_INCLUDE_UTM (unset here), so nothing references UTMLauncher. Re-add UTM by
      # dispatching with include_utm=true for the final build.
      - name: Exclude UTM from project (fast iteration)
        if: github.event.inputs.include_utm != 'true'
        run: |
          perl -0pi -e 's/^[^\n]*- framework: Vendor\/UTMPrebuilt\/Frameworks\/UTM\.framework\n[^\n]*embed: true\n//m' project.yml
          if grep -q "Vendor/UTMPrebuilt/Frameworks/UTM.framework" project.yml; then
            echo "::error::failed to strip UTM.framework from project.yml"; exit 1
          fi
          echo "UTM excluded from project.yml (fast build)"

      - name: Generate build/Version.xcconfig
        run: |
          set -e
          mkdir -p build
          Y=$(date -u +%Y); M=$(date -u +%m); D=$(date -u +%d)
          VER="${Y}.$((10#$M)).$((10#$D))"
          BUILD=$(git rev-list --count HEAD)
          COMMIT=$(git rev-parse --short HEAD)
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > build/Version.xcconfig <<EOF
          OPENCLAW_IOS_VERSION = ${VER}
          OPENCLAW_MARKETING_VERSION = ${VER}
          OPENCLAW_BUILD_VERSION = ${BUILD}
          OPENCLAW_GIT_COMMIT = ${COMMIT}
          OPENCLAW_BUILD_TIMESTAMP = ${TS}
          EOF
          echo "--- build/Version.xcconfig ---"; cat build/Version.xcconfig

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned archive
        run: |
          set -o pipefail
          # Enable the UTM code paths (gated by #if OPENCLAW_INCLUDE_UTM) only for the final build.
          UTM_COND=()
          if [ "${{ github.event.inputs.include_utm }}" = "true" ]; then
            UTM_COND=("SWIFT_ACTIVE_COMPILATION_CONDITIONS=\$(inherited) OPENCLAW_INCLUDE_UTM")
          fi
          xcodebuild archive \
            -project OpenClaw.xcodeproj \
            -scheme OpenClaw \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$PWD/build/OpenClaw.xcarchive" \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            ENABLE_APP_INTENTS_METADATA_GENERATION=NO \
            "${UTM_COND[@]}"

      # UTM SE needs its ~63 runtime dep frameworks and QEMU firmware inside the app bundle.
      # Xcode embedded UTM.framework itself (project.yml dependency); OpenClaw's code never
      # references the deps (they're UTM.framework's @rpath loads), so copy them straight into
      # Frameworks/ here. QEMU firmware + vulkan ICDs go at the bundle ROOT because UTM reads
      # them from Bundle.main (= this app once embedded). zsign deep-signs everything later.
      - name: Embed UTM runtime frameworks + resources
        if: github.event.inputs.include_utm == 'true'
        run: |
          set -e
          APP=$(ls -d build/OpenClaw.xcarchive/Products/Applications/*.app | head -1)
          if [ ! -d Vendor/UTMPrebuilt/Frameworks ]; then echo "::error::Vendor/UTMPrebuilt missing"; exit 1; fi
          mkdir -p "$APP/Frameworks"
          n=0
          for f in Vendor/UTMPrebuilt/Frameworks/*.framework; do
            name=$(basename "$f")
            [ "$name" = "UTM.framework" ] && continue   # already embedded by Xcode
            rm -rf "$APP/Frameworks/$name"
            cp -R "$f" "$APP/Frameworks/$name"
            n=$((n+1))
          done
          # Firmware/ROMs + vulkan ICDs at bundle root (Bundle.main/qemu, Bundle.main/vulkan).
          rm -rf "$APP/qemu" "$APP/vulkan"
          cp -R Vendor/UTMPrebuilt/Resources/qemu "$APP/qemu"
          [ -d Vendor/UTMPrebuilt/Resources/vulkan ] && cp -R Vendor/UTMPrebuilt/Resources/vulkan "$APP/vulkan" || true
          echo "Embedded $n UTM dep frameworks + qemu/vulkan resources"
          echo "::group::UTM.framework @rpath deps present?"
          otool -L "$APP/Frameworks/UTM.framework/UTM" | grep -E "@rpath.*(qemu|glib|spice|pixman)" | head -5 || true
          echo "::endgroup::"
          ls "$APP/Frameworks" | grep -cE "\.framework$" | sed 's/^/frameworks in bundle: /'

      - name: Package unsigned IPA
        run: |
          set -e
          APP=$(ls -d build/OpenClaw.xcarchive/Products/Applications/*.app | head -1)
          echo "App bundle: $APP"
          echo "::group::embedded frameworks"; ls "$APP/Frameworks/" || true; echo "::endgroup::"
          FM="$APP/Frameworks/FoliumMode.framework/FoliumMode"
          if [ -f "$FM" ]; then
            echo "::group::FoliumMode dynamic deps (@rpath = must be embedded)"
            otool -L "$FM" | grep -E "@rpath|@executable_path" || echo "(none - all deps static)"
            echo "::endgroup::"
          fi
          DF="$APP/Frameworks/Delta.framework/Delta"
          if [ -f "$DF" ]; then
            echo "::group::Delta.framework @rpath deps (cores must be embedded)"
            otool -L "$DF" | grep -E "@rpath" || echo "(none)"
            echo "::endgroup::"
          fi
          FF="$APP/Frameworks/Feather.framework/Feather"
          if [ -f "$FF" ]; then
            echo "::group::Feather.framework @rpath deps (OpenSSL must be embedded)"
            otool -L "$FF" | grep -E "@rpath" || echo "(none)"
            echo "::endgroup::"
          fi
          rm -rf build/Payload && mkdir -p build/Payload
          cp -R "$APP" build/Payload/
          (cd build && zip -qry OpenClaw-unsigned.ipa Payload)
          ls -lh build/OpenClaw-unsigned.ipa

      - name: Publish unsigned IPA to a Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          TAG="ci-unsigned"
          # Rolling "latest unsigned build" release. Releases bypass the Actions
          # artifact-storage quota and give a stable download page.
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" build/OpenClaw-unsigned.ipa \
            --title "Unsigned CI build" \
            --notes "Unsigned OpenClaw build from ${GITHUB_SHA}. Sign it with the 'Re-sign IPA' workflow." \
            --prerelease
          echo "Published unsigned IPA to release '$TAG'."
