name: UTM SE build (framework)

# Milestone 2b for the UTM SE mode embed: apply the fork (iOS-SE app target ->
# UTM.framework: bridging-header -> umbrella, drop Embed Libraries, neutralize @main) and
# build UTM.framework against our prebuilt sysroot. Manual, or on push to utm-mode.

on:
  workflow_dispatch:
  push:
    branches: [utm-mode]
    paths:
      - "Modes/UTM/fork/**"
      - ".github/workflows/utm-build.yml"

env:
  UTM_REPO: https://github.com/utmapp/UTM.git
  UTM_SHA: e4a4c34b671284263fc69f81b607de494d7e9b65   # matches the utm-sysroot release
  XCODE_PATH: /Applications/Xcode_26.0.app

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout OpenClaw (for the fork scripts)
        uses: actions/checkout@v4
        with:
          path: openclaw

      - name: Clone UTM + submodules
        run: |
          set -e
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git clone "$UTM_REPO" utm
          cd utm
          git checkout "$UTM_SHA"
          git submodule sync --recursive
          git -c protocol.version=2 submodule update --init --recursive --jobs 4 || true

      - name: Download + extract our prebuilt sysroot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          gh release download utm-sysroot --repo "${{ github.repository }}" --pattern sysroot.tgz --dir utm
          cd utm
          tar -xzf sysroot.tgz && rm sysroot.tgz
          ls -d sysroot-ios-tci-arm64 >/dev/null

      - name: Apply OpenClaw UTM fork
        run: |
          set -e
          sudo gem install xcodeproj --no-document
          chmod +x openclaw/Modes/UTM/fork/apply_fork.sh
          bash openclaw/Modes/UTM/fork/apply_fork.sh "$PWD/utm" "$PWD/openclaw/Modes/UTM/fork"

      - name: Select Xcode 26
        run: |
          if [ -d "$XCODE_PATH" ]; then sudo xcode-select -s "$XCODE_PATH"; else echo "::warning::$XCODE_PATH missing; using $(xcode-select -p)"; fi
          xcodebuild -version

      - name: Build UTM.framework (arm64 device)
        run: |
          cd utm
          set -o pipefail
          xcodebuild build \
            -project UTM.xcodeproj \
            -scheme iOS-SE \
            -sdk iphoneos -arch arm64 \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            2>&1 | tee build.log \
            | grep -E "error:|BUILD (SUCCEEDED|FAILED)|Undefined symbols|ld: |non-modular|missing required|module map" || true
          grep -q "\*\* BUILD SUCCEEDED \*\*" build.log || { echo "::error::UTM.framework build did not succeed"; exit 1; }

      - name: Diagnostics (always)
        if: always()
        run: |
          cd utm
          echo "=== errors (if any) ==="
          grep -E "error:|Undefined symbols|non-modular|missing required|module map" build.log 2>/dev/null | head -40 || true
          echo "=== last 60 lines ==="
          tail -60 build.log 2>/dev/null || true
          FW=$(find build/Build/Products -type d -name "UTM.framework" 2>/dev/null | grep -iv EagerLinking | head -1)
          echo "framework: $FW"
          if [ -n "$FW" ]; then
            ls -la "$FW" | head -30
            file "$FW/UTM" 2>/dev/null || true
          fi

      # M4 inventory: report exactly what UTM.framework needs at runtime, so the OpenClaw
      # project.yml embed list (Vendor/UTMPrebuilt/**) can be assembled precisely. Only runs
      # on a successful build.
      - name: Inventory runtime dependencies (M4)
        if: success()
        run: |
          cd utm
          PROD=build/Build/Products/Release-iphoneos
          echo "=== Products dir ($PROD) ==="
          ls -la "$PROD" 2>/dev/null || true
          echo
          echo "=== *.framework built by the scheme ==="
          find "$PROD" -maxdepth 1 -name "*.framework" -type d 2>/dev/null | sed 's#.*/##' | sort || true
          echo
          echo "=== otool -L UTM.framework/UTM (its LC_LOAD_DYLIBs) ==="
          otool -L "$PROD/UTM.framework/UTM" 2>/dev/null || true
          echo
          for f in $(find "$PROD" -maxdepth 1 -name "*.framework" -type d 2>/dev/null); do
            b="$f/$(basename "$f" .framework)"
            [ -f "$b" ] || continue
            echo "=== otool -L $(basename "$f")/$(basename "$b") ==="
            otool -L "$b" 2>/dev/null | grep -vE "/usr/lib|/System/" || true
            echo
          done
          echo "=== sysroot dylibs (sysroot-ios-tci-arm64/lib/*.dylib) ==="
          ls -la sysroot-ios-tci-arm64/lib/*.dylib 2>/dev/null | awk '{print $5, $NF}' | sed 's#.*/##' || true
          echo "sysroot dylib count: $(find sysroot-ios-tci-arm64/lib -maxdepth 1 -name '*.dylib' 2>/dev/null | wc -l)"
          echo
          echo "=== sysroot share/firmware (edk2/seabios/qemu roms) ==="
          find sysroot-ios-tci-arm64/share -maxdepth 2 -type d 2>/dev/null | head -40 || true

      # Collect the full prebuilt bundle: UTM.framework + every sibling framework the scheme
      # built + the sysroot's QEMU dylibs and firmware. This becomes Vendor/UTMPrebuilt/ in
      # OpenClaw. Superset; the exact embed list is refined in project.yml from the inventory.
      - name: Assemble UTMPrebuilt bundle (M4)
        if: success()
        run: |
          cd utm
          PROD=build/Build/Products/Release-iphoneos
          OUT=../out/UTMPrebuilt
          mkdir -p "$OUT/Frameworks" "$OUT/qemu"
          # 1. The framework + all sibling frameworks (QEMUKit, CocoaSpiceNoUsb, ...).
          for f in $(find "$PROD" -maxdepth 1 -name "*.framework" -type d 2>/dev/null); do
            cp -R "$f" "$OUT/Frameworks/"
          done
          # 2. The QEMU runtime dylibs (qemu-system-*, glib, pixman, spice, ...) from sysroot.
          cp sysroot-ios-tci-arm64/lib/*.dylib "$OUT/qemu/" 2>/dev/null || true
          # 3. Firmware / ROM resources QEMU loads at runtime.
          if [ -d sysroot-ios-tci-arm64/share ]; then
            cp -R sysroot-ios-tci-arm64/share "$OUT/qemu/share"
          fi
          echo "=== UTMPrebuilt assembled ==="
          du -sh "$OUT" 2>/dev/null || true
          find "$OUT" -maxdepth 2 -name "*.framework" -o -maxdepth 2 -name "*.dylib" | sed 's#.*/out/##' | sort | head -100
          mkdir -p ../out && tar czf ../out/UTMPrebuilt.tgz -C ../out UTMPrebuilt

      - name: Upload UTMPrebuilt bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: UTMPrebuilt
          path: out/UTMPrebuilt.tgz
          if-no-files-found: ignore
