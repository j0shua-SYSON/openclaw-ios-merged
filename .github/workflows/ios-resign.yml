name: Re-sign IPA

# Signs an unsigned OpenClaw IPA (from the "iOS Build (unsigned)" workflow) with
# YOUR certificate + provisioning profile, and uploads a signed IPA you can install.
#
# One-time setup (set these repo secrets):
#   SIGNING_P12_BASE64            = base64 of your .p12 certificate
#   SIGNING_MOBILEPROVISION_BASE64 = base64 of your .mobileprovision
#   SIGNING_P12_PASSWORD          = the .p12 password (may be empty)
# See RESIGN.md for the exact `gh secret set` commands (Windows + macOS/Linux).

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: "Run ID of the 'iOS Build (unsigned)' run to sign. Leave blank to use the latest successful build on this branch."
        required: false
        default: ""
      strip_extensions:
        description: "Strip app extensions + Watch app before signing (recommended for single-profile sideload signing)."
        type: boolean
        default: true

jobs:
  resign:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check required secrets
        env:
          P12: ${{ secrets.SIGNING_P12_BASE64 }}
          PROF: ${{ secrets.SIGNING_MOBILEPROVISION_BASE64 }}
        run: |
          missing=0
          if [ -z "$P12" ]; then echo "::error::Missing secret SIGNING_P12_BASE64"; missing=1; fi
          if [ -z "$PROF" ]; then echo "::error::Missing secret SIGNING_MOBILEPROVISION_BASE64"; missing=1; fi
          exit $missing

      - name: Download unsigned IPA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          RID="${{ inputs.build_run_id }}"
          if [ -z "$RID" ]; then
            RID=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow "iOS Build (unsigned)" \
              --branch "${{ github.ref_name }}" --status success --limit 1 \
              --json databaseId --jq '.[0].databaseId')
          fi
          echo "Signing artifact from build run: $RID"
          gh run download "$RID" --repo "$GITHUB_REPOSITORY" -n OpenClaw-unsigned -D incoming
          ls -R incoming

      - name: Decode signing assets
        env:
          P12: ${{ secrets.SIGNING_P12_BASE64 }}
          PROF: ${{ secrets.SIGNING_MOBILEPROVISION_BASE64 }}
        run: |
          set -e
          echo "$P12" | base64 --decode > cert.p12
          echo "$PROF" | base64 --decode > profile.mobileprovision
          security cms -D -i profile.mobileprovision > profile.plist
          /usr/libexec/PlistBuddy -x -c 'Print :Entitlements' profile.plist > entitlements.plist
          echo "--- Provisioning entitlements ---"; cat entitlements.plist

      - name: Import certificate
        env:
          PW: ${{ secrets.SIGNING_P12_PASSWORD }}
        run: |
          set -e
          KC="$RUNNER_TEMP/build.keychain"; KCPW="ci-$RANDOM"
          security create-keychain -p "$KCPW" "$KC"
          security set-keychain-settings -lut 21600 "$KC"
          security unlock-keychain -p "$KCPW" "$KC"
          security import cert.p12 -k "$KC" -P "$PW" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KC" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KCPW" "$KC" >/dev/null
          IDENTITY=$(security find-identity -v -p codesigning "$KC" | awk -F '"' 'NR==1 && NF>=2 {print $2}')
          if [ -z "$IDENTITY" ]; then echo "::error::No codesigning identity found in the provided .p12"; security find-identity -v "$KC"; exit 1; fi
          echo "IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "Signing identity: $IDENTITY"

      - name: Unpack IPA
        run: |
          set -e
          IPA=$(ls incoming/*.ipa | head -1)
          rm -rf work && mkdir work
          unzip -q "$IPA" -d work
          APP=$(ls -d work/Payload/*.app | head -1)
          echo "APP=$APP" >> "$GITHUB_ENV"
          echo "App bundle: $APP"

      - name: Strip extensions + Watch (optional)
        if: ${{ inputs.strip_extensions }}
        run: |
          set -e
          rm -rf "$APP/PlugIns" "$APP/Watch" "$APP/com.apple.WatchPlaceholder" || true
          echo "Stripped PlugIns / Watch"

      - name: Re-sign
        run: |
          set -e
          cp profile.mobileprovision "$APP/embedded.mobileprovision"
          # Sign nested dylibs and frameworks first (deepest first).
          if [ -d "$APP/Frameworks" ]; then
            find "$APP/Frameworks" -type f -name '*.dylib' -exec codesign -f -s "$IDENTITY" --timestamp=none {} \;
            find "$APP/Frameworks" -type d -name '*.framework' -exec codesign -f -s "$IDENTITY" --timestamp=none {} \;
          fi
          # Sign any remaining nested code (extensions / watch) if not stripped.
          find "$APP" -type d \( -name '*.appex' -o -name '*.app' \) ! -path "$APP" -print | while read -r comp; do
            [ -d "$comp/Frameworks" ] && find "$comp/Frameworks" -type d -name '*.framework' -exec codesign -f -s "$IDENTITY" --timestamp=none {} \;
            codesign -f -s "$IDENTITY" --timestamp=none --entitlements entitlements.plist "$comp" || true
          done
          # Sign the main app last, with the provisioning entitlements.
          codesign -f -s "$IDENTITY" --timestamp=none --entitlements entitlements.plist "$APP"
          echo "--- Verification ---"
          codesign --verify --deep --strict --verbose=2 "$APP" || true
          codesign -d --entitlements :- "$APP" || true

      - name: Repackage signed IPA
        run: |
          set -e
          (cd work && zip -qry ../OpenClaw-signed.ipa Payload)
          ls -lh OpenClaw-signed.ipa

      - name: Upload signed IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-signed
          path: OpenClaw-signed.ipa
          if-no-files-found: error
